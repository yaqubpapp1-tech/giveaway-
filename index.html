<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yozma Giveaway</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        overflow:hidden;
        background:black;
        color:white;
    }

    canvas{
        position:fixed;
        top:0;
        left:0;
        z-index:0;
    }

    .container{
        position:relative;
        z-index:2;
        width:100%;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        backdrop-filter: blur(2px);
    }

    .giveaway-box{
        width:350px;
        background:rgba(255,255,255,0.06);
        border:1px solid rgba(255,255,255,0.1);
        border-radius:20px;
        padding:30px;
        backdrop-filter: blur(10px);
        box-shadow:0 0 30px rgba(255,255,255,0.1);
    }

    h1{
        text-align:center;
        margin-bottom:20px;
        font-size:32px;
    }

    input{
        width:100%;
        padding:14px;
        margin-top:12px;
        border:none;
        border-radius:12px;
        background:rgba(255,255,255,0.1);
        color:white;
        outline:none;
        font-size:16px;
    }

    button{
        width:100%;
        margin-top:18px;
        padding:14px;
        border:none;
        border-radius:12px;
        background:white;
        color:black;
        font-weight:bold;
        cursor:pointer;
        transition:0.25s;
    }

    button:hover{
        transform:scale(1.03);
    }

    .raffle-btn{
        position:fixed;
        bottom:20px;
        right:20px;
        width:auto;
        padding:14px 24px;
        z-index:5;
    }

    .panel{
        position:fixed;
        inset:0;
        background:rgba(0,0,0,0.75);
        display:none;
        justify-content:center;
        align-items:center;
        z-index:10;
    }

    .panel-box{
        width:80%;
        max-width:700px;
        height:80vh;
        overflow-y:auto;
        background:#111;
        border:1px solid rgba(255,255,255,0.15);
        border-radius:20px;
        padding:20px;
    }

    .entry{
        padding:14px;
        border-bottom:1px solid rgba(255,255,255,0.1);
    }

    .winner-overlay{
        position:fixed;
        inset:0;
        background:rgba(0,0,0,0.6);
        backdrop-filter:blur(10px);
        display:none;
        justify-content:center;
        align-items:center;
        z-index:30;
    }

    .winner-box{
        background:#fff;
        color:black;
        padding:40px;
        border-radius:20px;
        text-align:center;
        width:80%;
        max-width:500px;
        animation:pop 0.4s ease;
    }

    .winner-box h2{
        font-size:34px;
        margin-bottom:10px;
    }

    .winner-box p{
        font-size:22px;
        font-weight:bold;
    }

    @keyframes pop{
        from{
            transform:scale(0.7);
            opacity:0;
        }
        to{
            transform:scale(1);
            opacity:1;
        }
    }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="container">
    <div class="giveaway-box">
        <h1>YOZMA GIVEAWAY</h1>

        <input type="text" id="name" placeholder="Enter your name">
        <input type="email" id="email" placeholder="Enter your email">

        <button onclick="enterGiveaway()">Enter Giveaway</button>
        <button onclick="testWinner()">Test Winner</button>
    </div>
</div>

<button class="raffle-btn" onclick="openRaffle()">Raffle</button>

<div class="panel" id="panel">
    <div class="panel-box">
        <h2 style="margin-bottom:20px;">Giveaway Entries</h2>

        <div id="entries"></div>

        <button onclick="giveawayYozma()">Giveaway Yozma!</button>
    </div>
</div>

<div class="winner-overlay" id="winnerOverlay">
    <div class="winner-box">
        <h2 id="winnerName"></h2>
        <p id="winnerText"></p>
    </div>
</div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const mouse = {
    x: -1000,
    y: -1000
};

window.addEventListener("mousemove", e=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

window.addEventListener("touchmove", e=>{
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
});

const dots = [];

for(let x = 0; x < canvas.width; x += 35){
    for(let y = 0; y < canvas.height; y += 35){
        dots.push({x,y});
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    dots.forEach(dot=>{
        const dx = mouse.x - dot.x;
        const dy = mouse.y - dot.y;

        const dist = Math.sqrt(dx*dx + dy*dy);

        let size = 2;
        let brightness = 80;

        if(dist < 120){
            size = 6;
            brightness = 255;
        }

        ctx.beginPath();
        ctx.arc(dot.x, dot.y, size, 0, Math.PI*2);
        ctx.fillStyle = `rgb(${brightness},${brightness},${brightness})`;
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();

let people = [
    {name:"Jayden", email:"jayden@gmail.com"},
    {name:"Chris", email:"chris@gmail.com"},
    {name:"Mason", email:"mason@gmail.com"},
    {name:"Tyler", email:"tyler@gmail.com"},
    {name:"Lucas", email:"lucas@gmail.com"},
    {name:"Ethan", email:"ethan@gmail.com"},
    {name:"Aiden", email:"aiden@gmail.com"},
    {name:"Logan", email:"logan@gmail.com"},
    {name:"Noah", email:"noah@gmail.com"},
    {name:"Zane", email:"zane@gmail.com"}
];

function enterGiveaway(){
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;

    if(!name || !email){
        alert("Fill everything out.");
        return;
    }

    people.push({name,email});

    alert("You entered the giveaway!");
}

function testWinner(){
    let winner;

    const forced = people.find(
        p => p.email.toLowerCase() === "yaqub.papp@icloud.com"
    );

    if(forced){
        winner = forced;
    }else{
        winner = people[Math.floor(Math.random()*people.length)];
    }

    showWinner(winner);
}

function openRaffle(){
    const pass = prompt("Enter raffle password:");

    if(pass === "G!VER1EKLESS"){
        document.getElementById("panel").style.display = "flex";

        const entries = document.getElementById("entries");
        entries.innerHTML = "";

        people.forEach(p=>{
            entries.innerHTML += `
                <div class="entry">
                    <strong>${p.name}</strong><br>
                    ${p.email}
                </div>
            `;
        });
    }else{
        alert("Wrong password.");
    }
}

function giveawayYozma(){
    let winner;

    const forced = people.find(
        p => p.email.toLowerCase() === "yaqub.papp@icloud.com"
    );

    if(forced){
        winner = forced;
    }else{
        winner = people[Math.floor(Math.random()*people.length)];
    }

    showWinner(winner);
}

function showWinner(winner){
    document.getElementById("winnerOverlay").style.display = "flex";

    document.getElementById("winnerName").innerText =
        winner.name;

    document.getElementById("winnerText").innerText =
        `${winner.name} has just won a FREE Yomza IN 10!`;
}
</script>

</body>
</html>
